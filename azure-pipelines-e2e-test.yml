parameters:
  - name: manualSuite
    displayName: Manual suite
    type: string
    default: smoke
    values:
      - smoke
      - regression
      - both

name: applications-e2e-$(Date:yyyyMMdd)$(Rev:.r)

trigger:
  branches:
    include:
      - gh-readonly-queue/main/*

pr:
  autoCancel: true
  branches:
    include:
      - '*'
  paths:
    include:
      - azure-pipelines-e2e-test.yml
      - docker-compose.yml
      - package.json
      - package-lock.json
      - e2e-tests/**
      - init/**
      - mock-server/**
      - packages/applications-service-api/**
      - packages/common/**
      - packages/forms-web-app/**

schedules:
  - cron: "0 2 * * 1-5"
    displayName: Weekday early regression
    branches:
      include:
        - main
    always: true
  - cron: "0 14 * * 1-5"
    displayName: Weekday afternoon regression
    branches:
      include:
        - main
    always: true

variables:
  - name: NodeVersion
    value: '22.x'
  - name: NpmCacheDir
    value: '$(Pipeline.Workspace)/.npm'
  - name: CypressCacheDir
    value: '$(Pipeline.Workspace)/.cache/Cypress'
  - name: RootCiEnvFile
    value: '$(Build.SourcesDirectory)/.env'

jobs:
  - job: Smoke_E2E
    displayName: Smoke E2E (PR)
    condition: >-
      or(
        and(
          eq(variables['Build.Reason'], 'PullRequest'),
          not(startsWith(variables['System.PullRequest.SourceBranch'], 'refs/heads/dependabot/'))
        ),
        startsWith(variables['Build.SourceBranch'], 'refs/heads/gh-readonly-queue/main/'),
        and(
          eq(variables['Build.Reason'], 'Manual'),
          or(
            eq('${{ parameters.manualSuite }}', 'smoke'),
            eq('${{ parameters.manualSuite }}', 'both')
          )
        )
      )
    timeoutInMinutes: 35
    pool:
      name: pins-odt-agent-pool-tests
      demands:
        - Agent.OS -equals Linux

    steps:
      - template: pipelines/templates/e2e-job-steps.yml
        parameters:
          runDisplayName: Run smoke E2E suite
          runScript: |
            cd e2e-tests
            npx cypress-tags run -b "$(CypressBrowser)" --env TAGS="@smoketest and not (@wip or @ignore)" --config video=false
          screenshotsArtifact: cypress-screenshots-smoke
          reportArtifact: cypress-html-report-smoke
          logsArtifact: cypress-supporting-logs-smoke

  - job: Regression_E2E
    displayName: Regression E2E
    condition: >-
      or(
        eq(variables['Build.Reason'], 'Schedule'),
        and(
          eq(variables['Build.Reason'], 'Manual'),
          or(
            eq('${{ parameters.manualSuite }}', 'regression'),
            eq('${{ parameters.manualSuite }}', 'both')
          )
        )
      )
    timeoutInMinutes: 60
    pool:
      name: pins-odt-agent-pool-tests
      demands:
        - Agent.OS -equals Linux
    strategy:
      matrix:
        shard_1_of_2:
          SHARD_INDEX: '1'
          SHARD_COUNT: '2'
        shard_2_of_2:
          SHARD_INDEX: '2'
          SHARD_COUNT: '2'
      maxParallel: 2

    steps:
      - template: pipelines/templates/e2e-job-steps.yml
        parameters:
          runDisplayName: Run regression E2E shard
          runScript: |
            cd e2e-tests

            SPEC_LIST="$(
              find cypress/e2e -type f -name '*.feature' | sort | awk \
                -v shard_index="$(SHARD_INDEX)" \
                -v shard_count="$(SHARD_COUNT)" \
                '((NR - 1) % shard_count) == (shard_index - 1) { print }' | paste -sd, -
            )"

            if [ -z "$SPEC_LIST" ]; then
              echo "No specs were assigned to shard $(SHARD_INDEX) of $(SHARD_COUNT)"
              exit 0
            fi

            SPEC_GLOB="{$SPEC_LIST}"

            echo "Running shard $(SHARD_INDEX) of $(SHARD_COUNT)"
            echo "$SPEC_LIST" | tr ',' '\n'
            npx cypress-tags run -b "$(CypressBrowser)" --env TAGS="not (@wip or @ignore)" --glob "$SPEC_GLOB"
          screenshotsArtifact: cypress-screenshots-regression-$(SHARD_INDEX)
          reportArtifact: cypress-html-report-regression-$(SHARD_INDEX)
          logsArtifact: cypress-supporting-logs-regression-$(SHARD_INDEX)
