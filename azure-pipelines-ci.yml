trigger:
  branches:
    include:
      # trigger for merge queue branches
      - gh-readonly-queue/*

pr:
  branches:
    include:
      - '*'
  paths:
    exclude:
      - infrastructure

resources:
  repositories:
    - repository: templates
      type: github
      endpoint: Planning-Inspectorate
      name: Planning-Inspectorate/common-pipeline-templates
      ref: refs/tags/release/3.25.2

extends:
  template: stages/wrapper_ci.yml@templates
  parameters:
    gitFetchDepth: 0
    globalVariables:
      - template: azure-pipelines-variables.yml@self
    validationJobs:
      - name: Run Linting & Tests
        steps:
          - script: git fetch origin main:main
            displayName: Fetch main branch
          - task: Cache@2
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)" | package-lock.json
              path: $(npm_config_cache)
              displayName: Cache NPM
          - template: ../steps/node_script.yml
            parameters:
              nodeVersion: 22
              script: npm ci
              environmentVariables:
                npm_config_cache: $(npm_config_cache)
          - template: ../steps/node_script.yml
            parameters:
              nodeVersion: 22
              script: cd packages/applications-service-api && npm run db:generate
          - template: ../steps/node_script.yml
            parameters:
              nodeVersion: 22
              condition: ne(variables['Build.SourceBranchName'], 'main')
              script: npm run commitlint
          - template: ../steps/node_script.yml
            parameters:
              nodeVersion: 22
              condition: succeededOrFailed()
              script: npm run lint
          - template: ../steps/node_script.yml
            parameters:
              nodeVersion: 22
              condition: succeededOrFailed()
              script: npm run format-check
          - template: ../steps/node_script.yml
            parameters:
              nodeVersion: 22
              condition: succeededOrFailed()
              script: npm run test:cov
      - name: Run Cypress E2E Tests Shard 1
        steps:
          - template: azure-pipelines-e2e-steps.yml
            parameters:
              artifactSuffix: shard-1
              shardIndex: 1
              shardCount: 4
      - name: Run Cypress E2E Tests Shard 2
        steps:
          - template: azure-pipelines-e2e-steps.yml
            parameters:
              artifactSuffix: shard-2
              shardIndex: 2
              shardCount: 4
      - name: Run Cypress E2E Tests Shard 3
        steps:
          - template: azure-pipelines-e2e-steps.yml
            parameters:
              artifactSuffix: shard-3
              shardIndex: 3
              shardCount: 4
      - name: Run Cypress E2E Tests Shard 4
        steps:
          - template: azure-pipelines-e2e-steps.yml
            parameters:
              artifactSuffix: shard-4
              shardIndex: 4
              shardCount: 4
