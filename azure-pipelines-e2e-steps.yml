parameters:
  - name: artifactSuffix
    type: string
  - name: shardIndex
    type: number
  - name: shardCount
    type: number

steps:
  - task: Cache@2
    inputs:
      key: 'npm | "$(Agent.OS)" | package-lock.json'
      restoreKeys: |
        npm | "$(Agent.OS)" | package-lock.json
      path: $(npm_config_cache)
      displayName: Cache root NPM
  - task: Cache@2
    inputs:
      key: 'npm-e2e | "$(Agent.OS)" | e2e-tests/package-lock.json'
      restoreKeys: |
        npm-e2e | "$(Agent.OS)" | e2e-tests/package-lock.json
      path: $(npm_config_cache)
      displayName: Cache E2E NPM
  - task: NodeTool@0
    inputs:
      versionSpec: '22.x'
    displayName: Install Node.js
  - script: npm ci
    displayName: Install root dependencies
    env:
      npm_config_cache: $(npm_config_cache)
  - script: npm --prefix e2e-tests ci
    displayName: Install E2E dependencies
    env:
      npm_config_cache: $(npm_config_cache)
  - script: |
      cat <<EOF > .env
      ENCRYPTION_SECRET_KEY=ci-test-encryption-secret
      EOF
    displayName: Create root CI .env
  - script: docker compose up -d mssql db redis api-mock-server
    displayName: Start infrastructure services
  - script: make db-setup
    displayName: Generate, migrate and seed DB
  - script: docker compose up -d applications-service-api applications-web-app
    displayName: Start application services
  - script: |
      set -e

      for url in http://localhost:3000/health http://localhost:9004/health; do
        echo "Waiting for $url"
        for attempt in $(seq 1 30); do
          if curl --fail --silent --show-error "$url" > /dev/null; then
            echo "$url is healthy"
            break
          fi

          if [ "$attempt" -eq 30 ]; then
            echo "Timed out waiting for $url"
            exit 1
          fi

          sleep 10
        done
      done
    displayName: Wait for app health checks
  - script: |
      cd e2e-tests
      SPEC_LIST="$(
        find cypress/e2e -type f -name '*.feature' | sort | awk \
          -v shard_index="${{ parameters.shardIndex }}" \
          -v shard_count="${{ parameters.shardCount }}" \
          '((NR - 1) % shard_count) == (shard_index - 1) { print }' | paste -sd, -
      )"

      if [ -z "$SPEC_LIST" ]; then
        echo "No specs were assigned to shard ${{ parameters.shardIndex }} of ${{ parameters.shardCount }}"
        exit 1
      fi

      echo "Running shard ${{ parameters.shardIndex }} of ${{ parameters.shardCount }}"
      echo "$SPEC_LIST" | tr ',' '\n'
      npx cypress-tags run -b chrome --env TAGS="not (@wip or @ignore)" --spec "$SPEC_LIST"
    displayName: Run Cypress shard
  - script: npm --prefix e2e-tests run test:e2e:postprocess
    displayName: Generate Cypress HTML report
    condition: succeededOrFailed()
  - task: PublishBuildArtifacts@1
    inputs:
      pathToPublish: '$(Build.SourcesDirectory)/e2e-tests/cypress/screenshots'
      artifactName: 'cypress-screenshots-${{ parameters.artifactSuffix }}'
    displayName: Publish Cypress screenshots
    condition: failed()
    continueOnError: true
  - task: PublishBuildArtifacts@1
    inputs:
      pathToPublish: '$(Build.SourcesDirectory)/e2e-tests/cypress/cucumber-report'
      artifactName: 'cypress-html-report-${{ parameters.artifactSuffix }}'
    displayName: Publish Cypress HTML report
    condition: succeededOrFailed()
    continueOnError: true
  - script: docker compose down
    displayName: Stop docker compose services
    condition: always()
